<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Adelynn's Jungle Dash - Adventure Game</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#388e3c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Adelynn's Jungle Dash">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body class="jungle-bg">
  <div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <!-- Game UI -->
    <div id="gameUI">
      <div id="score">Score: <span id="scoreValue">0</span></div>
      <div id="coins">Coins: <span id="coinsValue">0</span></div>
      <div id="lives">Lives: <span id="livesValue">3</span></div>
      <div id="controls" style="font-size: 12px; color: #666; margin-top: 5px;">
        WASD/Arrows: Move | Arrow Keys: Face Direction | Space: Jump | Shift: Sprint
      </div>
      <div id="audioStatus" style="font-size: 10px; color: #999; margin-top: 2px;">
        Sound effects: Loading...
      </div>
    </div>
    
    <!-- Game Over Screen -->
    <div id="gameOverScreen" class="game-screen" style="display: none;">
      <div class="screen-content">
        <h2>Game Over!</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <p>Coins Collected: <span id="finalCoins">0</span></p>
        <button class="menu-btn" onclick="restartGame()">Play Again!</button>
        <button class="menu-btn" onclick="window.location.href='mainmenu.html'">Main Menu</button>
      </div>
    </div>
    
    <!-- Pause Screen -->
    <div id="pauseScreen" class="game-screen" style="display: none;">
      <div class="screen-content">
        <h2>Game Paused</h2>
        <button class="menu-btn" onclick="resumeGame()">Resume</button>
        <button class="menu-btn" onclick="window.location.href='mainmenu.html'">Main Menu</button>
      </div>
    </div>
    
    <!-- Mobile Controls -->
    <div id="mobileControls">
      <button id="leftBtn" class="control-btn">←</button>
      <button id="rightBtn" class="control-btn">→</button>
      <button id="jumpBtn" class="control-btn">Jump</button>
    </div>
  </div>

  <script src="game.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(function(reg) {
        console.log('Service worker registered!', reg);
      }).catch(function(err) {
        console.log('Service worker registration failed:', err);
      });
    }
  </script>
</body>
</html>
