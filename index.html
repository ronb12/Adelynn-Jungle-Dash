<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Collector - Endless Runner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        
        <!-- Simple UI -->
        <div id="gameUI">
            <div id="score">Score: <span id="scoreValue">0</span></div>
            <div id="coins">Coins: <span id="coinsValue">0</span></div>
        </div>
        
        <!-- Game Over Screen -->
        <div id="gameOverScreen" style="display: none;">
            <h2>Game Over!</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <p>Coins Collected: <span id="finalCoins">0</span></p>
            <button onclick="restartGame()">Play Again</button>
        </div>
        
        <!-- Start Screen -->
        <div id="startScreen">
            <h1>Coin Collector</h1>
            <p>Collect coins and avoid obstacles!</p>
            <p>Use arrow keys or tap to move</p>
            <button onclick="startGame()">Start Game</button>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
